<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-content="metadata.title">Alexanne Mana-ayyyy</title>
  <meta name="description" content="data-content='metadata.description'">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <nav>
    <span class="logo" data-content="navigation.logo">Alexanne<span>Mana-ay</span></span>
    <ul class="nav-links" data-content="navigation.links">
      <!-- DYNAMIC -->
    </ul>
  </nav>

  <main>
    <!-- HERO -->
    <section id="hero" data-section="hero">
      <p class="label" data-content="hero.label">Student</p>
      <div class="hero-top">
        <div class="avatar-wrap">
          <div class="avatar-ring">
            <div class="avatar-inner">
              <img src="https://api.dicebear.com/9.x/pixel-art/svg?seed=AlexRivera&backgroundColor=1a0a2e&skinColor=f5cfa0" alt="Profile" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
              <div class="avatar-fallback">AR</div>
            </div>
          </div>
          <div class="avatar-status" title="Available"></div>
        </div>
        <div class="hero-info">
          <div class="hero-name" data-content="hero.name">Alex Rivera</div>
          <div class="hero-role" data-content="hero.role">Full-Stack Developer</div>
          <div class="hero-location" data-content="hero.location">📍 Cebu City</div>
        </div>
      </div>
      <h1 data-content="hero.headline">I build fast web apps</h1>
      <p class="hook" data-content="hero.hook">Dynamic content...</p>
      <div class="badges" data-content="hero.badges"></div>
      <div class="btn-row" data-content="hero.buttons"></div>
    </section>

    <!-- PROJECTS -->
    <section id="projects" data-section="projects">
      <p class="label" data-content="projects.label">Projects</p>
      <h2 data-content="projects.title">Selected Work</h2>
      <div class="projects-container" data-content="projects.items">
        <!-- DYNAMIC PROJECTS -->
      </div>
    </section>

    <!-- RESUME -->
    <section id="resume" data-section="resume">
      <p class="label" data-content="resume.label">Resume</p>
      <h2 data-content="resume.title">Skills & Experience</h2>
      <div class="skills-container" data-content="resume.skills"></div>
      <div class="experience-container" data-content="resume.experience"></div>
    </section>

    <!-- ARCHITECTURE -->
    <section id="structure" data-section="architecture">
      <p class="label" data-content="architecture.label">Architecture</p>
      <h2 data-content="architecture.title">File Structure</h2>
      <div class="tree-wrap">
        <p class="tree-title" data-content="architecture.repository">📁 Portfolio Repo</p>
        <div class="tree" data-content="architecture.tree"></div>
      </div>
      <div class="lh-wrap" data-content="architecture.lighthouse"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact" data-section="contact">
      <p class="label" data-content="contact.label">Contact</p>
      <h2 data-content="contact.title">Let's Talk</h2>
      <p data-content="contact.subtitle">Get in touch</p>
      
      <div class="contact-methods" data-content="contact.methods"></div>
      
      <form id="contactForm">
        <div class="form-grid" data-content="contact.form.fields"></div>
        <button type="submit" class="btn" data-content="contact.form.submit">Send →</button>
        <p class="form-note" data-content="contact.form.note">Secure form</p>
      </form>
    </section>
  </main>

  <footer data-content="footer">
    <!-- DYNAMIC FOOTER -->
  </footer>

  <script src="script.js"></script>
</body>
</html>
